name: Build and publish skill

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'config.yml'
      - 'modes/**'
      - '_context/**'
      - 'surveys/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build skill zip
        run: make skill

      - name: Commit zip back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/grill-me-engdocs.zip
          git diff --cached --quiet || git commit -m "build: update skill zip [skip ci]"
          git push

      # Uncomment when Anthropic Skills API is available:
